name: Update provider data

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build provider JSON
        run: python scripts/fetch_providers.py

      - name: Validate JSON
        run: python scripts/validate_json.py

      - name: Data quality gate
        run: python scripts/check_data_quality.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "[INFO] No data changes"
          else
            git commit -m "chore(data): refresh provider landscape"
            git push
          fi
